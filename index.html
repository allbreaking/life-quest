<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDg_0vMzFxSAR7GQm2C24bFJfKMCIv6sl0",
  authDomain: "life-quest-a27fd.firebaseapp.com",
  databaseURL: "https://life-quest-a27fd-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "life-quest-a27fd",
  storageBucket: "life-quest-a27fd.firebasestorage.app",
  messagingSenderId: "777139175049",
  appId: "1:777139175049:web:7b52a33410a1e5bdfcd058"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const SAVE_KEY = 'lifequest/save';
let _fbSaveTimer = null;

function serializeState() {
  return {...S, taskDone:[...S.taskDone], subDone:[...(S.subDone||new Set())], unlocked:[...S.unlocked]};
}

function deserializeState(data) {
  data.taskDone = new Set(Array.isArray(data.taskDone) ? data.taskDone : []);
  data.subDone  = new Set(Array.isArray(data.subDone)  ? data.subDone  : Object.keys(data.subDone||{}).map(Number).filter(Boolean));
  data.unlocked = new Set(Array.isArray(data.unlocked) ? data.unlocked : []);
  if(!data.svBase) data.svBase={str:60,exe:50,foc:55,moo:65};
  return data;
}

function showSyncStatus(msg) {
  const el = document.getElementById('sync-status');
  if(el) { el.textContent = msg; el.style.opacity='1'; clearTimeout(el._t); el._t=setTimeout(()=>el.style.opacity='0',3000); }
}

// debounced push — never blocks UI
window.fbSave = function() {
  clearTimeout(_fbSaveTimer);
  _fbSaveTimer = setTimeout(async () => {
    try {
      await set(ref(db, SAVE_KEY), serializeState());
      showSyncStatus('✅ 已同步');
    } catch(e) {
      showSyncStatus('⚠️ 同步失败');
    }
  }, 2000);
};

// background pull — page is already rendered with local data, this just refreshes if cloud is newer
window.fbLoad = function() {
  // set a 5s timeout — if Firebase takes longer, silently give up
  const timeout = setTimeout(() => showSyncStatus('⚠️ 网络慢，使用本地存档'), 5000);
  get(ref(db, SAVE_KEY)).then(snap => {
    clearTimeout(timeout);
    if (!snap.exists()) { window.fbSave(); showSyncStatus('✅ 已上传本地存档'); return; }
    const data = deserializeState(snap.val());
    const localRaw = localStorage.getItem('lq_state_v2');
    let useCloud = true;
    if (localRaw) {
      try {
        const local = JSON.parse(localRaw);
        useCloud = (data.xp + (data.lv-1)*100) >= (local.xp + (local.lv-1)*100);
      } catch(e) {}
    }
    if (useCloud) {
      S = data;
      localStorage.setItem('lq_state_v2', JSON.stringify(serializeState()));
      render(); updateXPBar();
      showSyncStatus('✅ 云端存档已加载');
    } else {
      window.fbSave();
      showSyncStatus('✅ 本地存档较新');
    }
  }).catch(() => {
    clearTimeout(timeout);
    showSyncStatus('⚠️ 网络不可用，使用本地存档');
  });
};

// fire after page is already painted — never delays first render
window.addEventListener('load', () => {
  // small delay so the page fully initialises first
  setTimeout(() => window.fbLoad(), 300);
});
</script>

// ═══════════════ TIME SYSTEM ═══════════════
function todayStr() {
  const d = new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}
function timeUntilMidnight() {
  const now = new Date();
  const midnight = new Date(now); midnight.setHours(24,0,0,0);
  const ms = midnight - now;
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function formatDate() {
  const d = new Date();
  const days = ['日','一','二','三','四','五','六'];
  return `${d.getMonth()+1}月${d.getDate()}日 周${days[d.getDay()]}`;
}
function checkNewDay() {
  const today = todayStr();
  const last  = S.lastActiveDate;
  if (last === today) return; // same day, nothing to do

  const yesterday = (() => {
    const d = new Date(); d.setDate(d.getDate()-1);
    return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
  })();

  // streak logic
  if (last === yesterday) {
    // completed yesterday? check if any task was done
    if (S.taskDone.size > 0) {
      S.streak += 1;
      if (S.streak > S.bestStreak) S.bestStreak = S.streak;
    } else {
      S.streak = 0;
    }
  } else if (last && last !== yesterday) {
    // missed a day (or more)
    S.streak = 0;
  }

  // shift week array: today becomes index 6
  const dayOfWeek = new Date().getDay(); // 0=Sun
  // rebuild weekDone: keep historical, reset today
  S.weekDone = [false,false,false,false,false,false,false];

  // selective reset by repeat cycle
  const now = new Date();
  const dow = now.getDay(); // 0=Sun
  const dom = now.getDate();
  const weekNum = Math.floor((now - new Date(now.getFullYear(),0,1)) / (7*86400000));
  if(!S.taskDone) S.taskDone = new Set();
  const tasks = S.userTasks || [];
  tasks.forEach(t => {
    const repeat = t.repeat || 'daily';
    const rdJS = t.repeatDay === 7 ? 0 : (t.repeatDay || 1);
    let shouldReset = false;
    if (repeat === 'daily') shouldReset = true;
    else if (repeat === 'weekly') shouldReset = dow === rdJS;
    else if (repeat === 'biweekly') shouldReset = dow === rdJS && weekNum % 2 === 0;
    else if (repeat === 'monthly') shouldReset = dom === (t.repeatDate || 1);
    // 'none' tasks never auto-reset
    if (shouldReset) S.taskDone.delete(t.id);
  });

  // stat reset: daily stats go back to base, long stats decay by 1
  if(!S.svBase) S.svBase={str:60,exe:50,foc:55,moo:65};
  STATS.forEach(s=>{
    if(s.type==='daily'){
      S.sv[s.key]=S.svBase[s.key]||s.base;
    } else if(s.type==='long'){
      S.sv[s.key]=Math.max(0, (S.sv[s.key]||s.base) - (s.decay||1));
    }
  });

  S.lastActiveDate = today;
  S._isNewDay = true;
  saveState();
}
function showNewDayPopup() {
  if (!S._isNewDay) return;
  S._isNewDay = false;
  const d = new Date();
  const greet = d.getHours()<12 ? '早上好' : d.getHours()<18 ? '下午好' : '晚上好';
  document.getElementById('pop-ico').textContent = '🌅';
  document.getElementById('pop-ttl').textContent = greet + '！新的一天';
  document.getElementById('pop-sub').textContent = formatDate() + ' · 连击 ' + S.streak + ' 天';
  document.getElementById('pop-xp').textContent  = '今日任务已刷新';
  document.getElementById('pop-layer').style.display = 'flex';
}
function updateDateBadge() {
  const el = document.getElementById('date-badge');
  if (el) el.textContent = formatDate() + '  · 重置 ' + timeUntilMidnight();
}
function startClock() {
  updateDateBadge();
  setInterval(() => {
    updateDateBadge();
    const ci=document.getElementById("countdown-inline"); if(ci) ci.textContent="距明天0点还有 "+timeUntilMidnight();
    // check if day rolled over while app was open
    if (S.lastActiveDate && S.lastActiveDate !== todayStr()) {
      checkNewDay(); render(); showNewDayPopup();
    }

function getTasks(lid,rid) {

const REPEAT_LABELS = {
  daily:'每天', weekly:'每周', biweekly:'每两周', monthly:'每月', none:'不重置'
};
const DAY_NAMES = ['周日','周一','周二','周三','周四','周五','周六'];

function shouldShowToday(t) {
  const repeat = t.repeat || 'daily';
  if (repeat === 'none') return true; // always visible (one-time)
  if (repeat === 'daily') return true;
  const now = new Date();
  const dow = now.getDay(); // 0=Sun
  // convert: our repeatDay 1=Mon...7=Sun → JS 1-6,0
  const rdJS = t.repeatDay === 7 ? 0 : (t.repeatDay || 1);
  if (repeat === 'weekly') return dow === rdJS;
  if (repeat === 'biweekly') {
    if (dow !== rdJS) return false;
    // use week number parity
    const startOfYear = new Date(now.getFullYear(), 0, 1);
    const weekNum = Math.floor((now - startOfYear) / (7 * 86400000));
    return weekNum % 2 === 0;
  }
  if (repeat === 'monthly') return now.getDate() === (t.repeatDate || 1);
  return true;
}

function repeatLabel(t) {
  const repeat = t.repeat || 'daily';
  if (repeat === 'daily') return '';
  if (repeat === 'weekly') return '每周' + DAY_NAMES[t.repeatDay===7?0:t.repeatDay||1];
  if (repeat === 'biweekly') return '隔周' + DAY_NAMES[t.repeatDay===7?0:t.repeatDay||1];
  if (repeat === 'monthly') return '每月' + (t.repeatDate||1) + '日';
  if (repeat === 'none') return '单次';
  return '';
}
function allTasksOld() {
  let arr = [];
  allLocs().forEach(l=>{
    if (l.rooms) l.rooms.forEach(r=>arr.push(...getTasks(l.id,r.id)));
    else arr.push(...getTasks(l.id));
  });
  S.customLocs.forEach(cl=>arr.push(...(cl.tasks||[])));
  return arr;
}

  ACHS.forEach(a=>{

    else if(a.id==='streak7') pass=S.streak>=7;
    else if(a.id==='lv5')     pass=S.lv>=5;
    else if(a.id==='streak14')pass=S.streak>=14;
    else if(a.id==='streak30')pass=S.streak>=30;
    else if(a.id==='alldone'){

// ═══════════════ MAP DRAW ═══════════════
function drawMap(cv) {
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#ddf0ea';ctx.fillRect(0,0,W,H*0.46);
  ctx.fillStyle='#c8dca8';ctx.fillRect(0,H*0.46,W,H);
  ctx.fillStyle='#d8c898';ctx.fillRect(0,H*0.53,W,H*0.11);
  ctx.fillStyle='#e8d8a8';ctx.fillRect(0,H*0.55,W,H*0.07);
  ctx.fillStyle='#f8e8b8';for(let x=14;x<W-8;x+=32)ctx.fillRect(x,H*0.575,16,3);
  function cloud(cx,cy,s){ctx.fillStyle='#fff';[[0,0,18,10],[16,-6,20,12],[32,0,16,10],[-3,4,14,8],[26,4,14,8]].forEach(([dx,dy,w,h])=>{ctx.beginPath();ctx.ellipse(cx+dx*s,cy+dy*s,w*s,h*s,0,0,Math.PI*2);ctx.fill();});}
  cloud(55,22,0.75);cloud(W*0.52,17,0.62);cloud(W*0.82,27,0.85);
  function tree(x,y,s=1){ctx.fillStyle='#a07848';ctx.fillRect(x-2*s,y,4*s,10*s);ctx.fillStyle='#5a9a50';ctx.beginPath();ctx.ellipse(x,y-2*s,9*s,12*s,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#7ab870';ctx.beginPath();ctx.ellipse(x-2*s,y-4*s,6*s,8*s,0,0,Math.PI*2);ctx.fill();}
  tree(22,106,1.0);tree(W-38,102,1.1);tree(W-20,109,0.85);
  function flower(x,y,c){ctx.fillStyle=c;for(let a=0;a<5;a++){const r=a*Math.PI*2/5;ctx.beginPath();ctx.ellipse(x+Math.cos(r)*3,y+Math.sin(r)*3,2,1.5,r,0,Math.PI*2);ctx.fill();}ctx.fillStyle='#f8e840';ctx.beginPath();ctx.arc(x,y,1.8,0,Math.PI*2);ctx.fill();}
  [[42,114,'#e898a0'],[50,122,'#f0c055'],[56,117,'#a0b8e8'],[W-60,110,'#f0c055'],[W-52,118,'#e898a0']].forEach(([x,y,c])=>flower(x,y,c));
  ctx.fillStyle='#a8ccee';ctx.beginPath();ctx.ellipse(W*0.76,141,26,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c8e4f8';ctx.beginPath();ctx.ellipse(W*0.745,139,14,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e0d0a0';const hx=W*0.205;ctx.beginPath();ctx.moveTo(hx-14,H*0.53);ctx.lineTo(hx-20,H);ctx.lineTo(hx+6,H);ctx.lineTo(hx+12,H*0.53);ctx.fill();

  const bw=W/3-12;
  const BPOS=[
    {id:'home',x:W*0.04,  y:58,  w:bw,   h:42,rh:22,rc:'#c8a070'},
    {id:'work',x:W*0.36,  y:53,  w:bw-4, h:58,rh:0, rc:'#7898c8',office:true},
    {id:'mall',x:W*0.67,  y:63,  w:bw,   h:42,rh:14,rc:'#c878a0'},
  ];
  S.customLocs.forEach((cl,i)=>BPOS.push({id:cl.id,x:24+i*44,y:124+(i%2)*10,w:36,h:24,rh:12,rc:'#98b878',small:true}));

  BPOS.forEach(b=>{
    const loc=getLoc(b.id);if(!loc)return;
    const sel=S.selectedLoc===b.id;
    const {x,y,w,h,rh,rc,office,small}=b;
    ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(x+2,y+2,w,h);
    if(office){
      ctx.fillStyle='#dde8f8';ctx.fillRect(x,y,w,h);
      ctx.fillStyle='#b0c8f0';ctx.fillRect(x+2,y+2,w-4,h-4);
      ctx.fillStyle='#78a8e8';
      for(let row=0;row<4;row++)for(let col=0;col<3;col++){ctx.fillRect(x+6+col*((w-12)/3),y+5+row*12,(w-12)/3-3,8);ctx.fillStyle='#90c0f8';ctx.fillRect(x+7+col*((w-12)/3),y+6+row*12,4,3);ctx.fillStyle='#78a8e8';}
      ctx.fillStyle='#8898c0';ctx.fillRect(x+w/2-5,y+h-12,10,12);
      ctx.fillStyle='#6888b8';ctx.fillRect(x,y,w,3);
    } else {
      ctx.fillStyle='#e4d4c0';ctx.fillRect(x,y,w,h);
      ctx.fillStyle='#f0e4d4';ctx.fillRect(x+1,y+1,w-2,h-2);
      if(rh>0){ctx.fillStyle=rc;ctx.beginPath();ctx.moveTo(x-4,y);ctx.lineTo(x+w/2,y-rh);ctx.lineTo(x+w+4,y);ctx.fill();ctx.fillStyle=rc+'bb';ctx.beginPath();ctx.moveTo(x-2,y);ctx.lineTo(x+w/2,y-rh+4);ctx.lineTo(x+w+2,y);ctx.fill();}
      if(!small){
        [[Math.round(w*0.1),7,Math.round(w*0.28),9],[Math.round(w*0.62),7,Math.round(w*0.28),9]].forEach(([dx,dy,ww,wh])=>{ctx.fillStyle='#b8d8f4';ctx.fillRect(x+dx,y+dy,ww,wh);ctx.strokeStyle='#c8e8f8';ctx.lineWidth=0.5;ctx.strokeRect(x+dx,y+dy,ww,wh);});
        ctx.fillStyle='#c07850';ctx.fillRect(x+w/2-5,y+h-12,9,12);ctx.beginPath();ctx.arc(x+w/2,y+h-12,4.5,Math.PI,0);ctx.fill();
      } else {ctx.fillStyle='#b8d0f0';ctx.fillRect(x+5,y+4,7,6);ctx.fillStyle='#c07850';ctx.fillRect(x+w/2-3,y+h-8,6,8);}
    }
    if(sel){ctx.strokeStyle=loc.col;ctx.lineWidth=2.5;ctx.strokeRect(x-2,y-(rh||0)-2,w+4,h+(rh||0)+4);}
    const lw=small?36:Math.min(64,w+8),lh=16;
    ctx.fillStyle='rgba(255,252,245,0.93)';ctx.beginPath();ctx.roundRect(x+w/2-lw/2,y-(rh||0)-28,lw,lh,5);ctx.fill();
    ctx.fillStyle=loc.col;ctx.font=`bold ${small?9:10}px Nunito,sans-serif`;ctx.textAlign='center';
    ctx.fillText(loc.ico+' '+loc.nm,x+w/2,y-(rh||0)-16);ctx.textAlign='left';
    if(sel){ctx.fillStyle=loc.col;ctx.beginPath();ctx.arc(x+w/2,y-(rh||0)-32,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x+w/2,y-(rh||0)-32,1.8,0,Math.PI*2);ctx.fill();}
  });

  const bp=BPOS.find(b=>b.id===S.selectedLoc);
  if(bp){
    const cx=bp.x+bp.w/2, cy=bp.y+bp.h+8;
    const lw=2.2, col='#5a3a1a';
    ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.lineCap='round'; ctx.lineJoin='round';
    // head
    ctx.beginPath(); ctx.arc(cx, cy-20, 5, 0, Math.PI*2); ctx.stroke();
    // body
    ctx.beginPath(); ctx.moveTo(cx, cy-15); ctx.lineTo(cx, cy-4); ctx.stroke();
    // arms
    ctx.beginPath(); ctx.moveTo(cx-7, cy-8); ctx.lineTo(cx, cy-12); ctx.lineTo(cx+7, cy-8); ctx.stroke();
    // legs
    ctx.beginPath(); ctx.moveTo(cx, cy-4); ctx.lineTo(cx-5, cy+5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy-4); ctx.lineTo(cx+5, cy+5); ctx.stroke();
  }
}

function getWorldTasks() {
  // Get tasks from userTasks that match the current location/room
  const room = getLoc(S.selectedLoc)?.rooms ? getRoom(S.selectedLoc, S.selectedRoom) : null;
  const locKey = room ? S.selectedLoc+'_'+S.selectedRoom : S.selectedLoc;
  const all = allTasks();
  // Only show daily tasks today (filtered by repeat cycle); main/side in quest board
  let tasks = all.filter(t => {
    if (t.type !== 'daily') return false;
    if (!shouldShowToday(t)) return false;
    if (!t.loc || t.loc === 'any') return true;
    if (t.loc === locKey) return true;
    if (!room && t.loc === S.selectedLoc) return true;
    return false;
  });
  // Sort: undone first (by time), done tasks at bottom
  tasks = [...tasks].sort((a,b) => {
    const ad = S.taskDone.has(a.id) ? 1 : 0;
    const bd = S.taskDone.has(b.id) ? 1 : 0;
    if (ad !== bd) return ad - bd;
    const at = a.time||'', bt = b.time||'';
    if (at && bt) return at.localeCompare(bt);
    if (at) return -1;
    if (bt) return 1;
    return 0;
  });
  return tasks;
}

function renderWorld() {

  const bonus=streakBonus();
  const room=loc?.rooms?getRoom(S.selectedLoc,S.selectedRoom):null;
  const tasks=getWorldTasks();
  const doneCnt=tasks.filter(t=>S.taskDone.has(t.id)).length;
  const locPills=allLocs().map(l=>`<div class="loc-pill ${S.selectedLoc===l.id?'on':''}" style="${S.selectedLoc===l.id?'background:'+l.col+';border-color:'+l.col:''};" onclick="selLoc('${l.id}')">${l.ico} ${l.nm}</div>`).join('');
  const roomBtns=loc?.rooms?`<div class="room-row">${loc.rooms.map(r=>`<div class="room-btn ${S.selectedRoom===r.id&&S.selectedLoc===loc.id?'on':''}" style="${S.selectedRoom===r.id&&S.selectedLoc===loc.id?'background:'+r.col+';border-color:'+r.col:''};" onclick="selRoom('${r.id}')"><span class="room-ico">${r.ico}</span>${r.nm}</div>`).join('')}</div>`:'';
  return `
    <canvas id="mc" height="190" style="height:190px"></canvas>
    <div class="card"><div class="card-body" style="padding:8px 10px">
      <div class="loc-pills">${locPills}</div>
      ${roomBtns}
    </div></div>
    ${bonus>1?`<div style="background:#fff8ec;border:1.5px solid #f0d890;border-radius:10px;padding:7px 12px;display:flex;align-items:center;gap:8px">
      <span style="font-size:15px">🔥</span>
      <span style="font-size:11px;font-weight:700;color:#b87820;flex:1">连击加成 ×${bonus.toFixed(1)} · ${S.streak}天</span>
      ${doneCnt===tasks.length&&tasks.length>0?'<span style="font-size:11px;font-weight:700;color:var(--acc2)">✅ 全完成</span>':''}
    </div>`:''}
    <div class="card">
      <div class="card-hdr">${room?room.ico+' '+room.nm:loc?.ico+' '+loc?.nm} · 任务 <span style="font-size:10px;color:var(--txt2)">${doneCnt}/${tasks.length}</span></div>
      ${tasks.map(t=>taskItemExpandable(t,bonus)).join('')}
      ${tasks.length===0?`<div class="empty-state">📋<br>此地点暂无任务<br><span style="font-size:11px">在「任务」Tab 新增任务并设置对应地点</span></div>`:''}
    </div>

}

function renderGoalsCard(bonus) {
  const all = allTasks();
  const mains = all.filter(t => t.type === 'main');
  const sides = all.filter(t => t.type === 'side');
  if (!mains.length && !sides.length) return '';

  const totalGoals = mains.length + sides.length;
  const doneGoals = [...mains, ...sides].filter(t => S.taskDone.has(t.id)).length;

  return `<div class="card">
    <div class="card-hdr" onclick="toggleGoals()" style="cursor:pointer;user-select:none">
      <span>🎯 进行中的目标</span>
      <span style="display:flex;align-items:center;gap:6px">
        <span style="font-size:10px;color:var(--txt2)">${doneGoals}/${totalGoals}</span>
        <span style="font-size:11px;color:var(--txt2);transition:transform 0.2s;display:inline-block;transform:rotate(${_goalsOpen?180:0}deg)">▾</span>
      </span>
    </div>
    ${_goalsOpen?`
      ${mains.length?`<div style="padding:4px 12px 2px;font-size:9px;font-weight:800;color:var(--acc);letter-spacing:1px">⚔ 主线</div>${mains.map(t=>taskItemExpandable(t,bonus)).join('')}`:''}
      ${sides.length?`<div style="padding:4px 12px 2px;font-size:9px;font-weight:800;color:var(--acc2);letter-spacing:1px">🌿 支线</div>${sides.map(t=>taskItemExpandable(t,bonus)).join('')}`:''}
    `:''}
  </div>`;
}

function renderTasks() {
  const bonus=streakBonus();
  const all=allTasks();
  const curType=S.taskCurType||'daily';
  const filtered=all.filter(t=>t.type===curType);
  const sortByTime=arr=>[...arr].sort((a,b)=>{
    const at=a.time||'',bt=b.time||'';
    if(at&&bt)return at.localeCompare(bt);
    if(at)return -1; if(bt)return 1; return 0;
  });
  const done=sortByTime(filtered.filter(t=>S.taskDone.has(t.id)));
  const undone=sortByTime(filtered.filter(t=>!S.taskDone.has(t.id)));
  const cfg=TYPES[curType];
  const prog=filtered.length?Math.round(done.length/filtered.length*100):0;

  const typeTabs=['daily','main','side'].map(type=>{
    const tCfg=TYPES[type];
    const tAll=all.filter(t=>t.type===type);
    const tDone=tAll.filter(t=>S.taskDone.has(t.id)).length;
    return `<div onclick="setTaskType('${type}')" style="flex:1;padding:8px 4px;text-align:center;cursor:pointer;border-bottom:3px solid ${curType===type?tCfg.col:'transparent'};transition:all 0.15s">
      <div style="font-size:13px">${tCfg.emoji}</div>
      <div style="font-size:10px;font-weight:700;color:${curType===type?tCfg.col:'var(--txt2)'};margin-top:2px">${tCfg.label.replace('任务','')}</div>
      <div style="font-size:9px;color:${curType===type?tCfg.col:'var(--txt3)'};font-weight:700">${tDone}/${tAll.length}</div>
    </div>`;
  }).join('');

  return `
  <div style="background:var(--card);border:1.5px solid var(--bd);border-radius:12px;overflow:hidden">
    <div style="display:flex;border-bottom:1px solid var(--bd)">${typeTabs}</div>
    <div style="background:${cfg.bg};padding:10px 12px;display:flex;align-items:center;gap:10px">
      <span style="font-size:22px">${cfg.emoji}</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:800;color:${cfg.txtCol}">${cfg.label} · ${cfg.desc}</div>
        <div style="height:5px;background:rgba(0,0,0,0.08);border-radius:3px;overflow:hidden;margin-top:6px">
          <div style="height:100%;width:${prog}%;background:${cfg.col};border-radius:3px;transition:width 0.5s"></div>
        </div>
      </div>
      <div style="text-align:right;color:${cfg.txtCol}">
        <div style="font-size:20px;font-weight:800">${done.length}<span style="font-size:11px;opacity:0.6">/${filtered.length}</span></div>
        <div style="font-size:9px;font-weight:700;opacity:0.75">${prog}%</div>
      </div>
    </div>
  </div>

  ${curType==='daily'&&bonus>1?`<div style="background:#fff8ec;border:1.5px solid #f0d890;border-radius:10px;padding:7px 12px;display:flex;align-items:center;gap:8px">
    <span style="font-size:15px">🔥</span>
    <span style="font-size:11px;font-weight:700;color:#b87820;flex:1">连击加成 ×${bonus.toFixed(1)}</span>
    <span style="font-size:10px;color:var(--txt3)">重置 ${timeUntilMidnight()}</span>
  </div>`:''}

  ${undone.map(t=>taskItemExpandable(t,bonus)).join('')}
  ${done.length>0?`<div style="font-size:10px;font-weight:700;color:var(--txt3);letter-spacing:1px;padding:4px 2px">已完成</div>${done.map(t=>taskItemExpandable(t,bonus)).join('')}`:''}
  ${filtered.length===0?`<div style="text-align:center;padding:28px 16px;color:var(--txt3);font-size:13px;line-height:2"><div style="font-size:32px;margin-bottom:8px">${cfg.emoji}</div>还没有${cfg.label}<br>点击下方添加</div>`:''}

  <div onclick="openTaskAdd()" style="background:${cfg.bg};border:2px dashed ${cfg.bd};border-radius:12px;padding:12px;text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:${cfg.col}">＋ 添加${cfg.label}</div>

  ${_taskAddOpen?renderTaskAddForm():''}
  `;
}

    [...S.taskDone].some(id=>{const t=allTasks().find(t=>t.id===id);return t?.attrs?.includes('hlt');}) ? `<div class="buff" style="color:#2888a8;border-color:#50b8c8;background:#e0f4f8">清爽</div>` :'',

    </div>

        : (loc.tasks||[]).map(t=>taskItem(t,bonus)).join('');

function renderStats() {

      <div class="stat-bar" style="position:relative">
        <div class="stat-bf" style="width:${v}%;background:${s.col}"></div>
        ${isDaily&&bv?`<div style="position:absolute;top:-1px;left:${bv}%;width:2px;height:calc(100%+2px);background:${s.col};opacity:0.4;border-radius:1px"></div>`:''}
      </div>
      <div class="stat-v" style="color:${s.tc}">${v}</div>
      ${isDaily?`<div style="font-size:8px;color:var(--txt3)">基准 ${bv}</div>`:`<div style="font-size:8px;color:var(--txt3)">每日-${s.decay||1}</div>`}

  return `
    <div class="card">

      <div class="card-body"><div class="stat-g">${dailyStats.map(statCell).join('')}</div></div>
    </div>
    <div style="background:#fdf5fa;border:1.5px solid #e8c8e0;border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:10px">
      <span style="font-size:18px">😔</span>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:700;color:#9848a8">今天心情不太好？</div>
        <div style="font-size:10px;color:var(--txt2);margin-top:1px">记录低落情绪，心情 -20</div>
      </div>
      <button onclick="moodDown()" style="padding:6px 14px;border-radius:10px;border:1.5px solid #c878d8;background:transparent;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:#9848a8;cursor:pointer">记录</button>
    </div>
    <div class="card">
      <div class="card-hdr">长期积累 <span style="font-size:10px;color:var(--txt2);font-weight:400">每天衰减 -1，坚持任务维持</span></div>
      <div class="card-body"><div class="stat-g">${longStats.map(statCell).join('')}</div></div>
    </div>

      ${STATS.map(s=>{
        const rel=allTasks().filter(t=>(t.attrs||[]).includes(s.key));

      </div>
      <div style="font-size:10px;color:var(--txt3);margin-top:4px">距下一级还需 ${LV_CAP()-S.xp} XP</div>

}

function renderQuestBoard() {
  const bonus = streakBonus();
  const all = allTasks();
  const mains = all.filter(t => t.type === 'main');
  const sides = all.filter(t => t.type === 'side');
  if (!mains.length && !sides.length) return `<div style="text-align:center;padding:20px;color:var(--txt3);font-size:12px;line-height:2">📋 暂无主线或支线任务<br>在「任务」Tab 添加</div>`;

  const mainDone = mains.filter(t=>S.taskDone.has(t.id)).length;

function saveNewTask(){
  const nm=(document.getElementById('taf-nm')?.value||_taskAF.nm).trim();
  const desc=(document.getElementById('taf-desc')?.value||_taskAF.desc).trim();
  const xp=parseInt(document.getElementById('taf-xp')?.value||_taskAF.xp)||30;
  const loc=document.getElementById('taf-loc')?.value||_taskAF.loc;
  const time=(document.getElementById('taf-time')?.value||_taskAF.time).trim();
  if(!nm){showToast('请填写任务名称');return;}
  if(!S.userTasks) S.userTasks=[];
  if(_taskEditId!=null){
    const i=S.userTasks.findIndex(t=>t.id===_taskEditId);
    if(i>=0) S.userTasks[i]={...S.userTasks[i],..._taskAF,nm,desc,xp,loc,time,repeat:_taskAF.repeat,repeatDay:_taskAF.repeatDay,repeatDate:_taskAF.repeatDate,id:_taskEditId};
  } else {
    S.userTasks.push({id:S.taskNextId++,type:_taskAF.type,nm,ico:_taskAF.ico,xp,attrs:[..._taskAF.attrs],loc,time,repeat:_taskAF.repeat||'daily',repeatDay:_taskAF.repeatDay||1,repeatDate:_taskAF.repeatDate||1,desc,subs:[..._taskAF.subs]});
  }
  S.taskCurType=_taskAF.type;
  const wasEdit=_taskEditId!=null;
  _taskAddOpen=false; _taskEditId=null;
  saveState(); render(); showToast(wasEdit?'✅ 任务已更新':'✦ 任务已创建！');
}
function editTask(id){
  const t=S.userTasks.find(t=>t.id===id); if(!t)return;
  _taskAF={...t,subs:[...(t.subs||[])],attrs:[...(t.attrs||[])],time:t.time||'',repeat:t.repeat||'daily',repeatDay:t.repeatDay||1,repeatDate:t.repeatDate||1,subInp:''};
  _taskEditId=id; _taskAddOpen=true; render();
}
function deleteUserTask(id){
  // Store as string to avoid any type mismatch
  _pendingDeleteId=String(id);
  const task=S.userTasks.find(t=>String(t.id)===_pendingDeleteId);
  if(!task)return;
  const el=document.getElementById('del-confirm');
  if(el){
    document.getElementById('del-confirm-name').textContent='删除「'+task.nm+'」？';
    el.style.display='flex';
  }
}
function confirmDelete(){
  const el=document.getElementById('del-confirm'); if(el) el.style.display='none';
  const sid=_pendingDeleteId; _pendingDeleteId=null;
  if(sid==null)return;
  // Delete by id (string compare), completely independent of task name
  S.userTasks=S.userTasks.filter(t=>String(t.id)!==sid);
  S.taskDone.delete(Number(sid)); S.taskDone.delete(sid);
  _taskExpandId=null;
  saveState(); render(); showToast('🗑 任务已删除');
}
function cancelDelete(){
  _pendingDeleteId=null;
  const el=document.getElementById('del-confirm'); if(el) el.style.display='none';
}
function toggleTaskExpand(id){ _taskExpandId=_taskExpandId===id?null:id; render(); }
function toggleSubTask(sid, parentId, parentXp){
  if(!S.subDone) S.subDone=new Set();
  if(S.subDone.has(sid)){
    // unchecking a sub: if parent was auto-completed, undo it
    S.subDone.delete(sid);
    if(parentId!=null && S.taskDone.has(parentId)){
      // remove parent completion silently (no XP reversal on sub-uncheck of completed task)
      S.taskDone.delete(parentId);
      const bonus=streakBonus();
      S.xp=Math.max(0,S.xp-Math.round(parentXp*bonus));
      allTasks().find(t=>t.id===parentId)?.attrs?.forEach(k=>{
        const sd=STATS.find(s=>s.key===k); if(!sd)return;
        S.sv[k]=Math.max(0,(S.sv[k]||0)-sd.gain);
      });
    }
  } else {
    S.subDone.add(sid);
    // check if all subs of parent are now done → auto-complete parent
    if(parentId!=null && !S.taskDone.has(parentId)){
      const parent=allTasks().find(t=>t.id===parentId);
      if(parent?.subs?.length && parent.subs.every(s=>S.subDone.has(s.id))){
        // auto-complete parent
        S.taskDone.add(parentId);
        const bonus=streakBonus();
        const earned=Math.round(parentXp*bonus);
        S.xp+=earned;
        parent.attrs?.forEach(k=>{
          const sd=STATS.find(s=>s.key===k); if(!sd)return;
          S.sv[k]=Math.min(100,(S.sv[k]||0)+sd.gain);
        });
        updateXPBar();
        if(parent.type==='main'){
          document.getElementById('pop-ico').textContent='🎉';
          document.getElementById('pop-ttl').textContent='主线任务完成！';
          document.getElementById('pop-sub').textContent=parent.nm;
          document.getElementById('pop-xp').textContent='+'+earned+' XP';
          document.getElementById('pop-layer').style.display='flex';
        } else { showToast('✦ '+parent.nm+' 完成！+'+earned+' XP'); }
        checkAchs();
      }
    }
  }
  saveState(); render();
}

// ═══════════════ ACTIONS ═══════════════
function selLoc(id) {
  S.selectedLoc=id;
  const loc=getLoc(id);
  if(loc?.rooms?.length) S.selectedRoom=loc.rooms[0].id;
  saveState(); render();
}
function selLocAndNav(id) { selLoc(id); nav('world'); }
function selRoom(id) { S.selectedRoom=id; saveState(); render(); }
function toggleDay(i) {
  S.weekDone[i]=!S.weekDone[i];
  let s=0; for(let j=6;j>=0;j--){if(S.weekDone[j])s++;else break;}
  S.streak=Math.max(s,S.streak); if(S.streak>S.bestStreak)S.bestStreak=S.streak;
  saveState(); render();
}
function toggleTask(id, xp) {
  const bonus=streakBonus();
  const task=allTasks().find(t=>t.id===id);
  if(S.taskDone.has(id)){
    S.taskDone.delete(id);
    S.xp=Math.max(0,S.xp-Math.round(xp*bonus));
    task?.attrs?.forEach(k=>{
      const sd=STATS.find(s=>s.key===k); if(!sd)return;
      S.sv[k]=Math.max(0,(S.sv[k]||0)-sd.gain);
    });
    // clear all subtasks when unchecking parent
    task?.subs?.forEach(s=>{ if(S.subDone) S.subDone.delete(s.id); });
  } else {
    S.taskDone.add(id);
    const earned=Math.round(xp*bonus);
    S.xp+=earned;
    task?.attrs?.forEach(k=>{
      const sd=STATS.find(s=>s.key===k); if(!sd)return;
      S.sv[k]=Math.min(100,(S.sv[k]||0)+sd.gain);
    });
    // mark all subtasks done when manually completing parent
    if(!S.subDone) S.subDone=new Set();
    task?.subs?.forEach(s=>S.subDone.add(s.id));
    if(S.xp>=LV_CAP()){S.lv++;S.xp-=LV_CAP();showToast('🎉 升级！现在是 Lv.'+S.lv);}
    else {
      if(task?.type==='main'){
        document.getElementById('pop-ico').textContent='🎉';
        document.getElementById('pop-ttl').textContent='主线任务完成！';
        document.getElementById('pop-sub').textContent=task.nm;
        document.getElementById('pop-xp').textContent='+'+earned+' XP';
        document.getElementById('pop-layer').style.display='flex';
      } else showToast('+'+earned+' XP');
    }
    checkAchs();
  }
  saveState(); updateXPBar(); render();
}

  if(!nm){showToast('请填写地点名称');return;}
  const task=(document.getElementById('ma-task')?.value||'').trim();
  const cols=['#70a870','#a870a8','#a87050','#5088a8'];
  const col=cols[S.customLocs.length%cols.length];
  S.customLocs.push({id:'c'+S.nextCId++,nm,ico:S.addIcon,col,type:'custom',tasks:task?[{id:S.nextTId++,nm:task,xp:20,attrs:[]}]:[]});
  S.addIcon='🌿'; showToast('「'+nm+'」已加入地图！');
  saveState(); render();
}
function delLoc(id) {
  S.customLocs=S.customLocs.filter(l=>l.id!==id);
  if(S.selectedLoc===id){S.selectedLoc='home';S.selectedRoom='bedroom';}
  saveState(); render();
}

// ═══════════════ SAVE MANAGEMENT ═══════════════
function exportSave() {
  const data = JSON.stringify({...S, taskDone:[...S.taskDone], unlocked:[...S.unlocked]});
  // try clipboard
  if (navigator.clipboard) {
    navigator.clipboard.writeText(data).then(()=>showToast('✅ 存档已复制到剪贴板！')).catch(()=>exportFallback(data));
  } else { exportFallback(data); }
}
function exportFallback(data) {
  const a = document.createElement('a');
  a.href = 'data:text/json;charset=utf-8,'+encodeURIComponent(data);
  a.download = 'life-quest-save.json';
  a.click();
  showToast('✅ 存档文件已下载');
}
function importSave() {
  const el = document.getElementById('import-overlay');
  if(el) { document.getElementById('import-inp').value=''; el.style.display='flex'; }
}
function doImport() {
  const raw = document.getElementById('import-inp')?.value.trim();
  const el = document.getElementById('import-overlay');
  if(!raw) return;
  try {
    const parsed = JSON.parse(raw);
    parsed.taskDone = new Set(Array.isArray(parsed.taskDone) ? parsed.taskDone : []);
    parsed.subDone  = new Set(Array.isArray(parsed.subDone)  ? parsed.subDone  : Object.keys(parsed.subDone||{}).map(Number).filter(Boolean));
    parsed.unlocked = new Set(Array.isArray(parsed.unlocked) ? parsed.unlocked : []);
    if(!parsed.svBase) parsed.svBase={str:60,exe:50,foc:55,moo:65};
    S = parsed;
    if(el) el.style.display='none';
    saveState(); render(); updateXPBar();
    // also push to Firebase immediately
    if(typeof window.fbSave === 'function') window.fbSave();
    showToast('✅ 存档导入成功！');
  } catch(e) { showToast('❌ 格式错误，请检查存档数据'); }
}
function cancelImport() {
  const el = document.getElementById('import-overlay');
  if(el) el.style.display='none';
}
function resetConfirm() {
  const el=document.getElementById('reset-confirm');
  if(el) el.style.display='flex';
}
function doReset() {
  const el=document.getElementById('reset-confirm');
  if(el) el.style.display='none';
  localStorage.removeItem('lq_state_v2');
  loadState(); checkNewDay(); render(); updateXPBar();
  showToast('✅ 已重置');
}
function cancelReset() {
  const el=document.getElementById('reset-confirm');
  if(el) el.style.display='none';
}

// ═══════════════ NAV ═══════════════
function nav(t) {
  _curTab=t;
  document.querySelectorAll('.ntab,.bnav-btn').forEach(b=>{b.classList.toggle('on',b.dataset.tab===t);});
  document.getElementById('scroll-area').scrollTop=0;
  render();
}

function render() {
  const p=document.getElementById('panel'); if(!p)return;
  let html='';
  if(_curTab==='world')  html=renderWorld();
  else if(_curTab==='tasks')  html=renderTasks();
  else if(_curTab==='stats')  html=renderStats();
  else if(_curTab==='streak') html=renderStreak();
  else if(_curTab==='ach')    html=renderAch();
  else if(_curTab==='map')    html=renderMap();
  p.innerHTML=html;
  updateXPBar();

  // init map canvas
  const cvId = _curTab==='world'?'mc':_curTab==='map'?'mc2':null;
  if(cvId){
    const cv=document.getElementById(cvId);
    if(cv){
      cv.width=cv.offsetWidth||360;
      drawMap(cv);
      const BPOS_fn=(W,H)=>[
        {id:'home',x:W*0.04,y:58,w:W/3-12,h:42},{id:'work',x:W*0.36,y:53,w:W/3-16,h:58},{id:'mall',x:W*0.67,y:63,w:W/3-12,h:42},
        ...S.customLocs.map((cl,i)=>({id:cl.id,x:24+i*44,y:124,w:36,h:34}))
      ];
      cv.onclick=e=>{
        const rect=cv.getBoundingClientRect(),W=cv.width,H=cv.height;
        const sx=(e.clientX-rect.left)*(W/rect.width),sy=(e.clientY-rect.top)*(H/rect.height);
        const hit=BPOS_fn(W,H).find(b=>sx>=b.x-10&&sx<=b.x+b.w+10&&sy>=b.y-42&&sy<=b.y+b.h+10);
        if(hit){selLoc(hit.id);if(_curTab==='map')nav('world');}
      };
    }
  }
}

// ═══════════════ INIT ═══════════════
loadState();
checkNewDay();
render();
updateXPBar();
startClock();
showNewDayPopup();
</script>
</body>
